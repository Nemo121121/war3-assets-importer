# --- Capacity help dialog ---
help.capacityTitle=Unit Placement Capacity
help.capacityText=The capacity indicates how many units can fit inside the drawn shape\nwith the current spacing settings.\n\n  \u2022 Green: All selected units fit in the shape.\n  \u2022 Red: The shape is too small. Increase the shape size\n    or increase the spacing values.\n\nOnly units that fit will be placed on the map.

# --- Tooltips ---
tooltip.createUnits=<html>Add a custom unit definition to the map for each selected model.<br>Each unit will appear as a new entry in the Object Editor (W3U file).</html>
tooltip.placeUnits=<html>Place the created units on the terrain.<br>Draw a rectangle on the map preview to define the placement area,<br>or leave it blank to use the full camera-bounded map area.</html>
tooltip.clearUnits=<html>Remove all existing unit placements from the map before importing.<br>Use this to start fresh and avoid duplicates on repeated imports.</html>
tooltip.clearAssets=<html>Remove all previously imported assets from the map archive<br>before adding the new selection. Useful for replacing an old import without leftover files.</html>
tooltip.flattenPaths=<html>When checked, assets are stored at the root of the archive<br>(e.g. <b>Infantry/soldier.mdx</b> \u2192 <b>soldier.mdx</b>).<br>Command-button textures (BTN*/DISBTN*) always use their canonical WC3 path<br>regardless of this setting.</html>
tooltip.unitScaling=<html>Scale factor applied to the model size of all created units.<br>1.0 = original size, 2.0 = double size.</html>
tooltip.unitOriginId=<html>Base unit type ID used as the template for created units<br>(e.g. <b>hfoo</b> for Human Footman). New units inherit stats from this type.<br>Type to filter existing map units.</html>
tooltip.unitAngle=<html>Facing direction of placed units in degrees.<br>0\u00b0\u00a0=\u00a0East \u00a0 90\u00b0\u00a0=\u00a0North \u00a0 180\u00b0\u00a0=\u00a0West \u00a0 270\u00b0\u00a0=\u00a0South (default WC3 camera direction).</html>
tooltip.spacingX=<html>Horizontal gap between units on the placement grid,<br>measured in pixels relative to the displayed map image.</html>
tooltip.spacingY=<html>Vertical gap between units on the placement grid,<br>measured in pixels relative to the displayed map image.</html>
tooltip.placingOrder=<html>Order in which units fill the placement grid:<br>left-to-right row by row, or top-to-bottom column by column.</html>
tooltip.autoNameUnits=<html>Automatically set each unit's display name from its model filename.<br>Use the Format dropdown to choose how the filename is converted.</html>
tooltip.autoAssignIcon=<html>If a BTN* texture matching the model filename is found<br>among the selected assets, automatically assign it as the unit's command-card icon.</html>
tooltip.nameFormat=<html>How the model filename is converted into a display name.<br>Example \u2014 <i>InfantryAmerican</i>:<br>\u00a0\u00a0Space Separated (keep case): <b>Infantry American</b><br>\u00a0\u00a0Space Separated: <b>Infantry american</b><br>\u00a0\u00a0camelCase: <b>infantryAmerican</b><br>\u00a0\u00a0snake_case: <b>infantry_american</b><br>\u00a0\u00a0UPPER_CASE: <b>INFANTRY_AMERICAN</b></html>
tooltip.createDoodads=<html>Add a custom doodad definition to the map for each selected model.<br>Each doodad will appear as a new entry in the Object Editor (W3D file).</html>
tooltip.placeDoodads=<html>Place the created doodads on the terrain.<br>Uses the same placement grid as units.</html>
tooltip.doodadOriginId=<html>Base doodad type ID used as the template for created doodads<br>(e.g. <b>YTlb</b> for a tree). New doodads inherit properties from this type.</html>
tooltip.createAlternateUnits=<html>When checked, additional unit definitions are created for each alternate or upgrade animation<br>sequence detected in the MDX file (e.g. a sequence named "Stand Alternate" produces a second unit<br>with <b>uani=alternate</b>). Each extra unit occupies its own grid position in the placement area.</html>
tooltip.outputPath=Destination .w3x/.w3m file

