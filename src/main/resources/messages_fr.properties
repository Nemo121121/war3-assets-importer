help.capacityText=La capacit\u00e9 indique combien d\u2019unit\u00e9s peuvent tenir dans la zone dessin\u00e9e\navec les param\u00e8tres d\u2019espacement actuels.\n\n  \u2022 Vert\u00a0: toutes les unit\u00e9s s\u00e9lectionn\u00e9es tiennent dans la zone.\n  \u2022 Rouge\u00a0: la zone est trop petite. Agrandissez la zone\n    ou augmentez les valeurs d\u2019espacement.\n\nSeules les unit\u00e9s qui tiennent seront plac\u00e9es sur la carte.

# --- Infolulles ---
tooltip.createUnits=<html>Ajoute une d\u00e9finition d\u2019unit\u00e9 personnalis\u00e9e pour chaque mod\u00e8le s\u00e9lectionn\u00e9.<br>Chaque unit\u00e9 appara\u00eet comme une nouvelle entr\u00e9e dans l\u2019\u00c9diteur d\u2019objets (fichier W3U).</html>
tooltip.placeUnits=<html>Place les unit\u00e9s cr\u00e9\u00e9es sur le terrain.<br>Dessinez un rectangle sur l\u2019aper\u00e7u pour d\u00e9finir la zone de placement,<br>ou laissez-le vide pour utiliser toute la zone de la cam\u00e9ra.</html>
tooltip.clearUnits=<html>Supprime tous les placements d\u2019unit\u00e9s existants avant l\u2019import.<br>Utile pour repartir \u00e0 z\u00e9ro et \u00e9viter les doublons.</html>
tooltip.clearAssets=<html>Supprime tous les assets pr\u00e9c\u00e9demment import\u00e9s de l\u2019archive<br>avant d\u2019ajouter la nouvelle s\u00e9lection. Utile pour remplacer un import sans laisser de fichiers obsolètes.</html>
tooltip.flattenPaths=<html>Si coch\u00e9, les assets sont stock\u00e9s \u00e0 la racine de l\u2019archive<br>(ex. <b>Infantry/soldier.mdx</b> \u2192 <b>soldier.mdx</b>).<br>Les textures de bouton (BTN*/DISBTN*) utilisent toujours leur chemin WC3 canonique,<br>quelle que soit cette option.</html>
tooltip.unitScaling=<html>Facteur d\u2019\u00e9chelle appliqu\u00e9 \u00e0 la taille du mod\u00e8le des unit\u00e9s cr\u00e9\u00e9es.<br>1.0 = taille originale, 2.0 = double taille.</html>
tooltip.unitOriginId=<html>ID du type d\u2019unit\u00e9 de base utilis\u00e9 comme mod\u00e8le pour les nouvelles unit\u00e9s<br>(ex. <b>hfoo</b> pour Human Footman). Les nouvelles unit\u00e9s h\u00e9ritent des statistiques de ce type.<br>Saisissez du texte pour filtrer les unit\u00e9s de la carte.</html>
tooltip.unitAngle=<html>Direction de face des unit\u00e9s plac\u00e9es en degr\u00e9s.<br>0\u00b0\u00a0=\u00a0Est \u00a0 90\u00b0\u00a0=\u00a0Nord \u00a0 180\u00b0\u00a0=\u00a0Ouest \u00a0 270\u00b0\u00a0=\u00a0Sud (vue cam\u00e9ra WC3 par d\u00e9faut).</html>
tooltip.spacingX=<html>Espace horizontal entre les unit\u00e9s sur la grille de placement,<br>mesur\u00e9 en pixels par rapport \u00e0 l\u2019image de carte affich\u00e9e.</html>
tooltip.spacingY=<html>Espace vertical entre les unit\u00e9s sur la grille de placement,<br>mesur\u00e9 en pixels par rapport \u00e0 l\u2019image de carte affich\u00e9e.</html>
tooltip.placingOrder=<html>Ordre dans lequel les unit\u00e9s remplissent la grille\u00a0:<br>ligne par ligne (gauche-droite) ou colonne par colonne (haut-bas).</html>
tooltip.autoNameUnits=<html>D\u00e9finit automatiquement le nom d\u2019affichage de chaque unit\u00e9 d\u2019apr\u00e8s son nom de fichier.<br>Utilisez la liste Format pour choisir le style de conversion.</html>
tooltip.autoAssignIcon=<html>Si une texture BTN* correspondant au nom du mod\u00e8le est trouv\u00e9e<br>parmi les assets s\u00e9lectionn\u00e9s, elle est automatiquement assign\u00e9e comme ic\u00f4ne de l\u2019unit\u00e9.</html>
tooltip.nameFormat=<html>Comment le nom de fichier est converti en nom d\u2019affichage.<br>Exemple \u2014 <i>InfantryAmerican</i>\u00a0:<br>\u00a0\u00a0S\u00e9par\u00e9 par espaces (casse conserv\u00e9e)\u00a0: <b>Infantry American</b><br>\u00a0\u00a0S\u00e9par\u00e9 par espaces\u00a0: <b>Infantry american</b><br>\u00a0\u00a0camelCase\u00a0: <b>infantryAmerican</b><br>\u00a0\u00a0snake_case\u00a0: <b>infantry_american</b><br>\u00a0\u00a0UPPER_CASE\u00a0: <b>INFANTRY_AMERICAN</b></html>
tooltip.outputPath=Fichier de sortie .w3x/.w3m de destination

